name: Runtime Bench

# Benchmark the *runtime* of the optimizer (not its effectiveness): the wall time of each
# optimizer call over the openvm-eth set, plus per-pass attribution via `apc-optimizer profile`.
#
# On-demand only (it runs the full set serially, which takes a while). Dispatch it from the
# Actions UI or with, e.g.:
#
#   gh workflow run "Runtime Bench" -f pr=82        # bench PR #82's head, sticky-comment there
#   gh workflow run "Runtime Bench"                 # bench the dispatched branch, job summary only
#
# Results always go to the job summary; with `pr` set they are also posted as a sticky comment.

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number: bench its head and post/update a sticky comment there (empty = bench the dispatched branch, job summary only)"
        required: false
        default: ""
      n:
        description: "only the top N cases by cost rank (empty = all)"
        required: false
        default: ""
      repeat:
        description: "runs per case; the fastest is kept"
        required: false
        default: "1"

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr != '' && format('refs/pull/{0}/head', inputs.pr) || github.ref }}
      - uses: leanprover/lean-action@v1
      - name: Bench optimizer runtime
        run: |
          echo "BENCH_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          N='${{ inputs.n }}'
          REPEAT='${{ inputs.repeat }}'
          python3 OpenVmBenchmarks/runtime_bench.py --no-build --md bench.md \
            ${N:+--n "$N"} --repeat "${REPEAT:-1}"
      - name: Job summary
        run: cat bench.md >> "$GITHUB_STEP_SUMMARY"
      - name: PR comment
        if: inputs.pr != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- runtime-bench -->';
            const body = marker + '\n' + fs.readFileSync('bench.md', 'utf8') +
              '\n_Timings from a shared CI runner (`' + process.env.BENCH_SHA +
              '`); trust shares and orders of magnitude over exact numbers._';
            const issue_number = Number('${{ inputs.pr }}');
            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, per_page: 100});
            const prev = comments.find(c => c.body.startsWith(marker));
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prev.id, body});
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number, body});
            }

name = "apc-optimizer"
version = "0.1.0"
defaultTargets = ["ApcOptimizer", "apc-optimizer"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "master"

# Documentation-only dependency: builds the audited-surface "paper" (docs/paper).
# Not in defaultTargets, so `lake build` and CI never build it.
[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "v4.30.0-rc1"

[[lean_lib]]
name = "ApcOptimizer"

[[lean_exe]]
name = "apc-optimizer"
root = "Main"

[[lean_lib]]
name = "Paper"
srcDir = "docs/paper"

[[lean_exe]]
name = "paper"
srcDir = "docs/paper"
root = "PaperMain"
supportInterpreter = true

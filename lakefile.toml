name = "apc-optimizer"
version = "0.1.0"
defaultTargets = ["ApcOptimizer", "apc-optimizer"]

# Documentation-only dependency: builds the audited-surface docs site (docs/).
# Not in defaultTargets, so `lake build` and CI never build it. Declared before
# mathlib so mathlib's shared-dependency pins (e.g. plausible) take precedence —
# keeping `lake exe cache get` hashes correct.
[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "v4.30.0-rc1"

# Kept last so its versions of transitively-shared dependencies win. Pinned to an
# exact rev (not "master") so `lake update` cannot drift it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "e60d89a05065d2697d54edf3ca85f05ca920bbb4"

[[lean_lib]]
name = "ApcOptimizer"

[[lean_exe]]
name = "apc-optimizer"
root = "Main"

[[lean_lib]]
name = "Docs"
srcDir = "docs"

[[lean_exe]]
name = "docs"
srcDir = "docs"
root = "DocsMain"
supportInterpreter = true
